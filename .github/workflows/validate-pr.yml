name: Validate PR

# Run on PRs to production to catch issues before merge
on:
  pull_request:
    branches:
      - production

jobs:
  validate-versions:
    name: Validate Version Consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Check version consistency
        # Note: jq is pre-installed on ubuntu-latest runners
        run: |
          set -e

          echo "=== Version Consistency Check ==="
          echo ""

          # Get version from package.json (jq is pre-installed on Ubuntu runners)
          PKG_VERSION=$(jq -r .version package.json)
          echo "package.json version: $PKG_VERSION"

          # Get version from AI-CONTEXT.md
          AI_VERSION=$(grep -oP '^\> \*\*Version:\*\* \K[0-9]+\.[0-9]+\.[0-9]+' docs/AI-CONTEXT.md || echo "NOT_FOUND")
          echo "AI-CONTEXT.md version: $AI_VERSION"

          # Get version from docs/api/README.md (TypeDoc header)
          API_VERSION=$(head -1 docs/api/README.md | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' || echo "NOT_FOUND")
          echo "docs/api version: $API_VERSION"

          echo ""

          # Check AI-CONTEXT.md version
          if [ "$AI_VERSION" = "NOT_FOUND" ]; then
            echo "ERROR: Could not find version in docs/AI-CONTEXT.md"
            exit 1
          fi

          if [ "$PKG_VERSION" != "$AI_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            echo "  package.json: $PKG_VERSION"
            echo "  AI-CONTEXT.md: $AI_VERSION"
            echo ""
            echo "Fix: Run 'npm run docs' and commit the changes"
            exit 1
          fi

          # Check docs/api version
          if [ "$API_VERSION" = "NOT_FOUND" ]; then
            echo "ERROR: Could not find version in docs/api/README.md"
            exit 1
          fi

          if [ "$PKG_VERSION" != "$API_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            echo "  package.json: $PKG_VERSION"
            echo "  docs/api: $API_VERSION"
            echo ""
            echo "Fix: Run 'npm run docs' and commit the changes"
            exit 1
          fi

          echo "All versions match: $PKG_VERSION"

      - name: Check if version already published
        run: |
          set -e

          echo "=== npm Version Check ==="
          echo ""

          PKG_VERSION=$(jq -r .version package.json)
          PKG_NAME=$(jq -r .name package.json)

          # Get published version (returns empty if not published)
          PUBLISHED_VERSION=$(npm view "$PKG_NAME" version 2>/dev/null || echo "")

          if [ -z "$PUBLISHED_VERSION" ]; then
            echo "Package not yet published to npm"
            echo "Version $PKG_VERSION will be the first release"
            exit 0
          fi

          echo "Current npm version: $PUBLISHED_VERSION"
          echo "PR version: $PKG_VERSION"

          if [ "$PKG_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo ""
            echo "WARNING: Version $PKG_VERSION is already published to npm!"
            echo "If this PR contains changes that should be released,"
            echo "bump the version with 'npm version patch' before merging."
            echo ""
            # Don't fail - allow docs-only PRs that don't need a new version
            # Just warn so reviewers are aware
          else
            echo ""
            echo "Version $PKG_VERSION is new (not yet published)"
          fi

  quick-tests:
    name: Quick Validation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify documentation is current
        run: |
          npm run docs
          if [ -n "$(git status --porcelain docs/)" ]; then
            echo "ERROR: Documentation is out of date"
            echo "Run 'npm run docs' locally and commit the changes"
            echo ""
            echo "Changed files:"
            git status --porcelain docs/
            exit 1
          fi
          echo "Documentation is up to date"

  discover-examples:
    name: Discover Example Apps
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.find.outputs.examples }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Find examples with E2E tests
        id: find
        run: |
          examples=$(find examples -name playwright.config.ts -maxdepth 2 -exec dirname {} \; | xargs -I{} basename {} | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "examples=$examples" >> $GITHUB_OUTPUT
          echo "Found example apps: $examples"
          # Fail if no examples found (prevents silent skip of all E2E tests)
          count=$(echo "$examples" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No example apps with playwright.config.ts found"
            exit 1
          fi
          echo "Discovered $count example apps for E2E testing"

  example-e2e-tests:
    name: E2E Tests (${{ matrix.example }})
    needs: discover-examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        example: ${{ fromJson(needs.discover-examples.outputs.examples) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Install example dependencies
        run: npm ci
        working-directory: examples/${{ matrix.example }}

      - name: Install Playwright browsers
        run: npm exec playwright install -- --with-deps chromium
        working-directory: examples/${{ matrix.example }}

      - name: Clone OAuth proxy (pinned to known-good commit)
        env:
          # 4e8f45f: "Validate hostname against EEN domain allowlist" (2026-02-13)
          EEN_OAUTH_PROXY_SHA: '4e8f45f0ae15395f94c48e7b65c284f3c5edabd9'
        run: |
          git clone https://github.com/klaushofrichter/een-oauth-proxy.git ../een-oauth-proxy
          cd ../een-oauth-proxy && git checkout "$EEN_OAUTH_PROXY_SHA"

      - name: Install proxy dependencies
        run: npm ci
        working-directory: ../een-oauth-proxy/proxy

      - name: Create proxy secrets file
        run: |
          set -euo pipefail
          printf 'CLIENT_ID="%s"\n' "$CLIENT_ID" > ../een-oauth-proxy/proxy/.dev.vars
          printf 'CLIENT_SECRET="%s"\n' "$CLIENT_SECRET" >> ../een-oauth-proxy/proxy/.dev.vars
          printf 'ADMIN_EMAILS="%s"\n' "test@example.com" >> ../een-oauth-proxy/proxy/.dev.vars
          printf 'ALLOWED_ORIGINS="%s"\n' "http://127.0.0.1:3333" >> ../een-oauth-proxy/proxy/.dev.vars
          chmod 600 ../een-oauth-proxy/proxy/.dev.vars
        env:
          CLIENT_ID: ${{ secrets.VITE_EEN_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

      - name: Start OAuth proxy
        run: |
          cd ../een-oauth-proxy/proxy
          npx wrangler dev --port 8787 &
          PROXY_PID=$!
          echo "PROXY_PID=$PROXY_PID" >> $GITHUB_ENV

          sleep 2

          if ! kill -0 $PROXY_PID 2>/dev/null; then
            echo "ERROR: Wrangler failed to start"
            exit 1
          fi

          PROXY_READY=false
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8787 > /dev/null 2>&1; then
              echo "Proxy is ready"
              PROXY_READY=true
              break
            fi
            echo "Waiting for proxy... ($i/30)"
            sleep 1
          done

          if [ "$PROXY_READY" != "true" ]; then
            echo "ERROR: Proxy failed to become ready after 30 seconds"
            exit 1
          fi

      - name: Run example E2E tests
        run: npm run test:e2e
        working-directory: examples/${{ matrix.example }}
        env:
          VITE_PROXY_URL: http://127.0.0.1:8787
          VITE_EEN_CLIENT_ID: ${{ secrets.VITE_EEN_CLIENT_ID }}
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-report-${{ matrix.example }}
          path: examples/${{ matrix.example }}/playwright-report/
          retention-days: 7

      - name: Stop OAuth proxy
        if: always()
        run: |
          if [ -n "$PROXY_PID" ]; then
            kill $PROXY_PID 2>/dev/null || true
          fi
          pkill -f wrangler 2>/dev/null || true
