version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    # Auto-merge patch updates for trusted actions
    # Major/minor updates will still require manual review
    open-pull-requests-limit: 5

  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    # Group all npm updates into a single PR
    groups:
      npm-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    # Ignore major version updates for pinned TypeScript version
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # eslint 10 not yet supported by @typescript-eslint/eslint-plugin 8.x
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
