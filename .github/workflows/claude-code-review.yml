name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip Dependabot PRs - they don't have access to repository secrets
    if: github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write  # Required by anthropics/claude-code-action@v1 for OIDC authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # Uses the v1 floating tag to auto-update with new releases.
        # Unlike other actions which are SHA-pinned, claude-code-action uses a tag
        # because: (1) it's an official Anthropic action with trusted releases,
        # (2) SHA pinning triggers Dependabot PRs that fail CI since Dependabot
        # workflows cannot access repository secrets (ANTHROPIC_API_KEY).
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            IMPORTANT: Before posting a new review comment, check if there is an existing review comment from a previous run (look for "## Code Review" in PR comments). If found, UPDATE that comment instead of creating a new one using `gh pr comment --edit-last`. If no previous comment exists, create a new one with `gh pr comment`.

            Include the commit SHA in your review header so it's clear which commit was reviewed.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

