name: Test Release

# Run tests when a PR is merged to production, or manually triggered
on:
  pull_request:
    types: [closed]
    branches:
      - production
  workflow_dispatch:

jobs:
  test:
    # Run if: PR was merged to production, OR manually triggered on production only.
    # The production branch restriction prevents workflow_dispatch on arbitrary branches
    # from triggering npm publish via the workflow_run chain.
    if: >
      github.event.pull_request.merged == true ||
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'production')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build and verify package
        run: npm run verify-package

      - name: Verify documentation is current
        run: |
          npm run docs
          if [ -n "$(git status --porcelain docs/)" ]; then
            echo "ERROR: Documentation is out of date"
            echo "Run 'npm run docs' locally and commit the changes"
            echo ""
            echo "Changed files:"
            git status --porcelain docs/
            echo ""
            echo "Diff:"
            git diff docs/
            exit 1
          fi
          echo "Documentation is up to date"

      - name: Discover example apps with E2E tests
        id: discover
        run: |
          # Find all example apps with playwright.config.ts
          EXAMPLES=$(find examples -name "playwright.config.ts" -exec dirname {} \; | sort)
          echo "Found example apps with E2E tests:"
          echo "$EXAMPLES"
          # Store as JSON array for later use
          EXAMPLES_JSON=$(echo "$EXAMPLES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "examples=$EXAMPLES_JSON" >> $GITHUB_OUTPUT

      - name: Install example dependencies
        env:
          EXAMPLES: ${{ steps.discover.outputs.examples }}
        run: |
          for example in $(echo "$EXAMPLES" | jq -r '.[]'); do
            echo "Installing dependencies for $example..."
            (cd "$example" && npm ci)
          done

      - name: Install Playwright browsers
        env:
          EXAMPLES: ${{ steps.discover.outputs.examples }}
        run: |
          # Install Playwright browsers from first example
          # All examples use the same pinned version (1.58.0)
          FIRST_EXAMPLE=$(echo "$EXAMPLES" | jq -r '.[0]')
          echo "Installing Playwright browsers from $FIRST_EXAMPLE..."
          (cd "$FIRST_EXAMPLE" && npm exec playwright install -- --with-deps chromium)

      - name: Clone OAuth proxy (pinned to known-good commit)
        env:
          # 4e8f45f: "Validate hostname against EEN domain allowlist" (2026-02-13)
          EEN_OAUTH_PROXY_SHA: '4e8f45f0ae15395f94c48e7b65c284f3c5edabd9'
        run: |
          git clone https://github.com/klaushofrichter/een-oauth-proxy.git ../een-oauth-proxy
          cd ../een-oauth-proxy && git checkout "$EEN_OAUTH_PROXY_SHA"

      - name: Install proxy dependencies
        run: npm ci
        working-directory: ../een-oauth-proxy/proxy

      - name: Create proxy secrets file
        run: |
          set -euo pipefail
          # Use printf with quoted values to handle special characters (e.g., # in passwords)
          printf 'CLIENT_ID="%s"\n' "$CLIENT_ID" > ../een-oauth-proxy/proxy/.dev.vars
          printf 'CLIENT_SECRET="%s"\n' "$CLIENT_SECRET" >> ../een-oauth-proxy/proxy/.dev.vars
          printf 'ADMIN_EMAILS="%s"\n' "test@example.com" >> ../een-oauth-proxy/proxy/.dev.vars
          printf 'ALLOWED_ORIGINS="%s"\n' "http://127.0.0.1:3333" >> ../een-oauth-proxy/proxy/.dev.vars
          # Restrict file permissions
          chmod 600 ../een-oauth-proxy/proxy/.dev.vars
          # Validate file structure before masking
          echo "Validating .dev.vars structure:"
          grep -q '^CLIENT_ID=' ../een-oauth-proxy/proxy/.dev.vars && echo "✓ CLIENT_ID present"
          grep -q '^CLIENT_SECRET=' ../een-oauth-proxy/proxy/.dev.vars && echo "✓ CLIENT_SECRET present"
          grep -q '^ADMIN_EMAILS=' ../een-oauth-proxy/proxy/.dev.vars && echo "✓ ADMIN_EMAILS present"
          grep -q '^ALLOWED_ORIGINS=' ../een-oauth-proxy/proxy/.dev.vars && echo "✓ ALLOWED_ORIGINS present"
          echo "Created .dev.vars (masked):"
          sed 's/=.*/=***/' ../een-oauth-proxy/proxy/.dev.vars
        env:
          CLIENT_ID: ${{ secrets.VITE_EEN_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

      - name: Start OAuth proxy
        run: |
          cd ../een-oauth-proxy/proxy
          npx wrangler dev --port 8787 &
          PROXY_PID=$!
          echo "PROXY_PID=$PROXY_PID" >> $GITHUB_ENV

          # Give wrangler a moment to start or fail
          sleep 2

          # Verify wrangler process is still running
          if ! kill -0 $PROXY_PID 2>/dev/null; then
            echo "ERROR: Wrangler failed to start"
            exit 1
          fi

          # Wait for proxy to be ready
          PROXY_READY=false
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8787 > /dev/null 2>&1; then
              echo "Proxy is ready"
              PROXY_READY=true
              break
            fi
            echo "Waiting for proxy... ($i/30)"
            sleep 1
          done

          if [ "$PROXY_READY" != "true" ]; then
            echo "ERROR: Proxy failed to become ready after 30 seconds"
            exit 1
          fi

      - name: Run example e2e tests
        env:
          EXAMPLES: ${{ steps.discover.outputs.examples }}
          VITE_PROXY_URL: http://127.0.0.1:8787
          VITE_EEN_CLIENT_ID: ${{ secrets.VITE_EEN_CLIENT_ID }}
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          FAILED_EXAMPLES=""
          for example in $(echo "$EXAMPLES" | jq -r '.[]'); do
            echo ""
            echo "=========================================="
            echo "Running E2E tests for $example"
            echo "=========================================="
            if (cd "$example" && npm run test:e2e); then
              echo "✓ $example tests passed"
            else
              echo "✗ $example tests FAILED"
              FAILED_EXAMPLES="$FAILED_EXAMPLES $example"
            fi
          done

          if [ -n "$FAILED_EXAMPLES" ]; then
            echo ""
            echo "=========================================="
            echo "FAILED EXAMPLES:$FAILED_EXAMPLES"
            echo "=========================================="
            exit 1
          fi
          echo ""
          echo "All example E2E tests passed!"

      - name: Upload Playwright reports on failure
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: failure()
        with:
          name: playwright-reports
          path: examples/*/playwright-report/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            PACKAGE_NAME=$(node -p "require('./package.json').name")
            VERSION=$(node -p "require('./package.json').version")
            REPO_URL="https://github.com/${{ github.repository }}"
            ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -X POST -H 'Content-type: application/json' \
              --data "{
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \":warning: *${PACKAGE_NAME} v${VERSION}* test release failed!\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"Tests failed before deployment. Package was NOT published.\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\n<${REPO_URL}|${{ github.repository }}>\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Actions:*\n<${ACTIONS_URL}|View workflow run>\"}
                    ]
                  }
                ]
              }" \
              "$SLACK_WEBHOOK"
          fi

      - name: Stop OAuth proxy
        if: always()
        run: |
          if [ -n "$PROXY_PID" ]; then
            kill $PROXY_PID 2>/dev/null || true
          fi
          # Also kill any remaining wrangler processes
          pkill -f wrangler 2>/dev/null || true
