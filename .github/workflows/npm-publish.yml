name: Publish to npm

# Publish to npm when a PR is merged to production, or manually triggered
on:
  pull_request:
    types: [closed]
    branches:
      - production
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, do not publish)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    # Run if: PR was merged, OR manually triggered
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build and verify package
        run: npm run verify-package

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        # Use --ignore-scripts to skip prepublishOnly since we already built via verify-package
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run - skip publish
        if: ${{ inputs.dry_run }}
        run: echo "Dry run mode - skipping npm publish"

      - name: Notify Slack on success
        if: success() && !inputs.dry_run
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          TZ: America/Chicago
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            VERSION=$(node -p "require('./package.json').version")
            PACKAGE_NAME=$(node -p "require('./package.json').name")
            NPM_URL="https://www.npmjs.com/package/${PACKAGE_NAME}"
            RELEASE_TIME=$(date '+%Y-%m-%d %H:%M:%S %Z')
            # Get package size from the tarball
            TARBALL=$(npm pack --dry-run 2>&1 | grep -E 'package size' | sed 's/.*package size: *//' | cut -d' ' -f1-2)
            if [ -z "$TARBALL" ]; then
              TARBALL="unknown"
            fi
            curl -X POST -H 'Content-type: application/json' \
              --data "{
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \":package: *${PACKAGE_NAME} v${VERSION}* published to npm\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*Package:*\n<${NPM_URL}|${PACKAGE_NAME}>\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Version:*\n${VERSION}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Size:*\n${TARBALL}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Released:*\n${RELEASE_TIME}\"}
                    ]
                  }
                ]
              }" \
              "$SLACK_WEBHOOK"
          fi

      - name: Notify Slack on failure
        if: failure() && !inputs.dry_run
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"een-api-toolkit npm publish failed! Check GitHub Actions."}' \
              "$SLACK_WEBHOOK"
          fi
