name: Publish to npm

# Publish to npm when test-release workflow succeeds, or manually triggered
on:
  workflow_run:
    workflows: ["Test Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, do not publish)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    # Run if: test workflow succeeded, OR manually triggered
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating GitHub releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For workflow_run, checkout the branch that triggered the test workflow
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Generate CHANGELOG.md from PRs and commits
        env:
          TZ: America/Chicago
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          NPM_URL="https://www.npmjs.com/package/${PACKAGE_NAME}"
          RELEASE_TIME=$(date '+%Y-%m-%d %H:%M:%S %Z')

          # Get commits since last tag for changelog
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMIT_RANGE="${LAST_TAG}..HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${LAST_TAG}...v${VERSION}"
            LAST_TAG_DATE=$(git log -1 --format=%ci "$LAST_TAG" 2>/dev/null | cut -d' ' -f1)
          else
            COMMIT_RANGE="HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/v${VERSION}"
            LAST_TAG_DATE="2000-01-01"
          fi

          # Generate CHANGELOG.md header
          cat > CHANGELOG.md << 'HEADER'
          # Changelog

          All notable changes to this project will be documented in this file.

          HEADER

          echo "## [${VERSION}] - $(date '+%Y-%m-%d')" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Extract release summary from merged PRs in this release only
          echo "### Release Summary" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Get PR numbers from merge commits in the commit range (only PRs in this release)
          git log $COMMIT_RANGE --oneline --merges | grep -oE "Merge pull request #[0-9]+" | grep -oE "[0-9]+" | sort -u > pr_numbers.txt 2>/dev/null || echo "" > pr_numbers.txt

          # Fetch details for each PR in this release
          > pr_summaries.txt
          if [ -s pr_numbers.txt ]; then
            while read -r PR_NUM; do
              if [ -n "$PR_NUM" ]; then
                gh pr view "$PR_NUM" --json number,title,body \
                  --jq '"#### PR #\(.number): \(.title)\n\(.body // "No description provided.")\n"' \
                  >> pr_summaries.txt 2>/dev/null || true
              fi
            done < pr_numbers.txt
          fi
          rm -f pr_numbers.txt

          if [ -s pr_summaries.txt ]; then
            cat pr_summaries.txt >> CHANGELOG.md
          else
            echo "No PR descriptions available for this release." >> CHANGELOG.md
          fi
          echo "" >> CHANGELOG.md
          rm -f pr_summaries.txt

          # Generate detailed changelog from commits safely (write to file first to avoid shell injection)
          git log $COMMIT_RANGE --pretty=format:"- %s" --no-merges > commits_raw.txt 2>/dev/null || echo "- Initial release" > commits_raw.txt
          grep -v "chore: Sync develop" commits_raw.txt | grep -v "^\s*$" > commits_filtered.txt || echo "- Initial release" > commits_filtered.txt

          # Categorize commits (read from file to avoid shell injection)
          FEATURES=$(grep -iE "^- (feat|add|new)" commits_filtered.txt || true)
          FIXES=$(grep -iE "^- (fix|bug|patch)" commits_filtered.txt || true)
          OTHER=$(grep -viE "^- (feat|add|new|fix|bug|patch)" commits_filtered.txt || true)
          rm -f commits_raw.txt commits_filtered.txt

          echo "### Detailed Changes" >> CHANGELOG.md
          echo "" >> CHANGELOG.md

          # Add categorized changes
          if [ -n "$FEATURES" ]; then
            echo "#### Features" >> CHANGELOG.md
            echo "$FEATURES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          if [ -n "$FIXES" ]; then
            echo "#### Bug Fixes" >> CHANGELOG.md
            echo "$FIXES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          if [ -n "$OTHER" ]; then
            echo "#### Other Changes" >> CHANGELOG.md
            echo "$OTHER" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          # Add links section
          cat >> CHANGELOG.md << LINKS
          ### Links
          - [npm package](${NPM_URL})
          - [Full Changelog](${COMPARE_URL})

          ---
          *Released: ${RELEASE_TIME}*
          LINKS

          echo "Generated CHANGELOG.md:"
          cat CHANGELOG.md

      - name: Check if version already published
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          # Check if this version already exists on npm
          if npm view "${PACKAGE_NAME}@${VERSION}" version > /dev/null 2>&1; then
            echo "Version ${VERSION} already exists on npm - skipping publish"
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} not yet published"
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: ${{ !inputs.dry_run && steps.version-check.outputs.already_published != 'true' }}
        # Use --ignore-scripts to skip prepublishOnly since we already built
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run - skip publish
        if: ${{ inputs.dry_run }}
        run: echo "Dry run mode - skipping npm publish"

      - name: Create GitHub Release
        if: success() && !inputs.dry_run && steps.version-check.outputs.already_published != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Create the tarball for the release (CHANGELOG.md is included via package.json files array)
          TARBALL=$(npm pack 2>&1 | grep -E '\.tgz$' | tail -1)

          # Validate tarball was created
          if [ -z "$TARBALL" ] || [ ! -f "$TARBALL" ]; then
            echo "Error: Failed to create tarball"
            exit 1
          fi
          echo "Created tarball: $TARBALL"

          # Store tarball size for Slack notification
          TARBALL_SIZE=$(du -h "$TARBALL" | cut -f1)
          echo "TARBALL_SIZE=$TARBALL_SIZE" >> $GITHUB_ENV
          echo "TARBALL_NAME=$TARBALL" >> $GITHUB_ENV

          # Rename CHANGELOG.md to include version for asset upload
          RELEASE_NOTES="RELEASE-NOTES-v${VERSION}.md"
          cp CHANGELOG.md "$RELEASE_NOTES"

          # Check if release already exists (idempotent - for workflow re-runs)
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "Release v${VERSION} already exists, updating..."
            gh release upload "v${VERSION}" "$TARBALL" "$RELEASE_NOTES" --clobber
            gh release edit "v${VERSION}" --notes-file CHANGELOG.md
          else
            echo "Creating new release v${VERSION}..."
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file CHANGELOG.md \
              "$TARBALL" \
              "$RELEASE_NOTES"
          fi

          # Clean up
          rm -f "$TARBALL" "$RELEASE_NOTES"

      - name: Notify Slack on success
        if: success() && !inputs.dry_run && steps.version-check.outputs.already_published != 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          TZ: America/Chicago
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            VERSION=$(node -p "require('./package.json').version")
            PACKAGE_NAME=$(node -p "require('./package.json').name")
            NPM_URL="https://www.npmjs.com/package/${PACKAGE_NAME}"
            GITHUB_RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
            RELEASE_NOTES_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/RELEASE-NOTES-v${VERSION}.md"
            REPO_URL="https://github.com/${{ github.repository }}"
            RELEASE_TIME=$(date '+%Y-%m-%d %H:%M:%S %Z')
            # Use package size from GitHub Release step (stored in GITHUB_ENV)
            PACKAGE_SIZE="${TARBALL_SIZE:-unknown}"
            curl -X POST -H 'Content-type: application/json' \
              --data "{
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \":package: *${PACKAGE_NAME} v${VERSION}* published\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*npm:*\n<${NPM_URL}|${PACKAGE_NAME}>\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*GitHub Release:*\n<${GITHUB_RELEASE_URL}|v${VERSION}>\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Size:*\n${PACKAGE_SIZE}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Released:*\n${RELEASE_TIME}\"}
                    ]
                  },
                  {
                    \"type\": \"context\",
                    \"elements\": [
                      {\"type\": \"mrkdwn\", \"text\": \"<${RELEASE_NOTES_URL}|Release Notes> · <${REPO_URL}|Repository>\"}
                    ]
                  }
                ]
              }" \
              "$SLACK_WEBHOOK"
          fi

      - name: Notify Slack on failure
        if: failure() && !inputs.dry_run
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            PACKAGE_NAME=$(node -p "require('./package.json').name")
            VERSION=$(node -p "require('./package.json').version")
            REPO_URL="https://github.com/${{ github.repository }}"
            ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            curl -X POST -H 'Content-type: application/json' \
              --data "{
                \"blocks\": [
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \":x: *${PACKAGE_NAME} v${VERSION}* publish failed!\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\n<${REPO_URL}|${{ github.repository }}>\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Actions:*\n<${ACTIONS_URL}|View workflow run>\"}
                    ]
                  }
                ]
              }" \
              "$SLACK_WEBHOOK"
          fi
