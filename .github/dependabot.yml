version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    # All updates require manual review and merge
    open-pull-requests-limit: 5

  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    # Group all npm updates into a single PR
    groups:
      npm-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    # TypeScript pinned to ~5.8.x for API Extractor compatibility with vite-plugin-dts
    # Block major and minor updates; ~ in package.json constrains npm install,
    # but Dependabot modifies package.json directly so it must be blocked here too
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      # eslint 10 not yet supported by @typescript-eslint/eslint-plugin 8.x
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
